# Copiar a /etc/nginx/sites-available/cafeintimo.conf y habilitar con sites-enabled.
# Tras instalar, ejecutar Certbot (ver install-nginx-tls.sh) para TLS en :443.
#
# Loyalty (Ktor) → 8080 | Invoicing (Node) → 3000 (solo localhost; Nginx es el frente público)

# --- API Loyalty ---
server {
    listen 80;
    listen [::]:80;
    server_name api.cafeintimo.mx;

    location / {
        proxy_pass http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }
}

# --- Facturación (Node + estáticos) ---
server {
    listen 80;
    listen [::]:80;
    server_name facturacion.cafeintimo.mx;

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }
}
